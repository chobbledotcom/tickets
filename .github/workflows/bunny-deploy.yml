name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      script_id:
        description: "Override Bunny staging script ID (defaults to BUNNY_STAGING_SCRIPT_ID secret)"
        required: false
        type: string
      main_instance_key:
        description: "MAIN_INSTANCE_KEY (optional; falls back to the secret). Only used by the backup step on manual runs."
        required: false
        type: string
      run_backup:
        description: "Back up the database before deploying (uncheck only if the backup is broken)"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubicloud-standard-4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Bunny edge script
        uses: ./.github/actions/build-bunny-script
        with:
          build_commit: ${{ github.sha }}

      # Back up the staging site's database before deploying (it migrates on its
      # next request). Only manual runs back up: a push to main (a merge) skips
      # the backup, so it needs no MAIN_INSTANCE_KEY. A manual run pastes the key
      # (or falls back to the secret) and can uncheck run_backup to skip the
      # backup too (e.g. if backups are broken).
      - name: Back up the staging site
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_backup }}
        uses: ./.github/actions/backup-site
        with:
          main_instance: ${{ secrets.MAIN_INSTANCE }}
          main_instance_key: ${{ inputs.main_instance_key || secrets.MAIN_INSTANCE_KEY }}
          script_id: ${{ inputs.script_id || secrets.BUNNY_STAGING_SCRIPT_ID }}
          access_key: ${{ secrets.BUNNY_ACCESS_KEY }}
          storage_zone_name: ${{ secrets.STORAGE_ZONE_NAME }}
          storage_zone_key: ${{ secrets.STORAGE_ZONE_KEY }}

      - name: Deploy to staging
        uses: ./.github/actions/deploy-bunny-script
        with:
          script_id: ${{ inputs.script_id || secrets.BUNNY_STAGING_SCRIPT_ID }}
          api_key: ${{ secrets.BUNNY_ACCESS_KEY }}
