name: Test

on:
  push:
    branches-ignore: [main]
  merge_group:

env:
  STRIPE_MOCK_VERSION: "0.188.0"

jobs:
  test:
    runs-on: ubicloud-standard-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache stripe-mock
        uses: actions/cache@v4
        with:
          path: .bin
          key: stripe-mock-${{ env.STRIPE_MOCK_VERSION }}-linux-amd64

      - name: Download stripe-mock
        run: |
          if [ ! -f .bin/stripe-mock ]; then
            mkdir -p .bin
            curl -sL "https://github.com/stripe/stripe-mock/releases/download/v${STRIPE_MOCK_VERSION}/stripe-mock_${STRIPE_MOCK_VERSION}_linux_amd64.tar.gz" | tar -xz -C .bin
            chmod +x .bin/stripe-mock
          fi

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Typecheck
        run: deno task typecheck

      - name: Lint
        run: deno task lint

      - name: Copy-paste detection
        run: deno task cpd

      - name: Build edge script
        run: deno task build:edge

      - name: Start stripe-mock
        run: |
          .bin/stripe-mock -http-port 12111 &
          sleep 2
          curl -s http://localhost:12111 > /dev/null && echo "stripe-mock is running"

      - name: Run tests with coverage
        env:
          STRIPE_MOCK_HOST: localhost
          STRIPE_MOCK_PORT: "12111"
          DB_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
        run: set -o pipefail && deno task test:coverage 2>&1 | tee test-output.log

      - name: Surface test failures in step summary
        if: failure()
        run: |
          {
            echo "## Test failure diagnostics"
            echo ""
            echo "### Last 200 lines of test output"
            echo '```'
            tail -200 test-output.log || echo "(no test-output.log)"
            echo '```'
            echo ""
            echo "### Lines matching FAILED / Error / AssertionError / uncovered"
            echo '```'
            grep -E "FAILED|error:|Error:|AssertionError|uncovered|coverage|Branch coverage|Line coverage" test-output.log | head -80 || echo "(no matches)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate HTML coverage report
        if: always()
        run: deno coverage coverage --html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/
