name: Biome Fix PR

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to fix (defaults to the branch selected when running the workflow)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: biome-fix-${{ inputs.target_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  biome-fix:
    runs-on: ubicloud-standard-8

    steps:
      - name: Resolve target and fix branches
        id: branches
        env:
          INPUT_TARGET_BRANCH: ${{ inputs.target_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          target_branch="${INPUT_TARGET_BRANCH:-$REF_NAME}"

          if [ -z "$target_branch" ]; then
            echo "Unable to resolve target branch" >&2
            exit 1
          fi

          case "$target_branch" in
            *-biome)
              echo "Target branch must not already end in -biome" >&2
              exit 1
              ;;
          esac

          fix_branch="${target_branch}-biome"
          {
            echo "target_branch=$target_branch"
            echo "fix_branch=$fix_branch"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branches.outputs.target_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.6

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Close existing Biome pull request
        env:
          FIX_BRANCH: ${{ steps.branches.outputs.fix_branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_pr="$(gh pr list --head "$FIX_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$existing_pr" ]; then
            gh pr close "$existing_pr" --comment "Recreating $FIX_BRANCH from the latest target branch state."
          fi

      - name: Delete existing Biome branch
        env:
          FIX_BRANCH: ${{ steps.branches.outputs.fix_branch }}
        run: |
          if git ls-remote --exit-code --heads origin "$FIX_BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$FIX_BRANCH"
          fi

      - name: Create fresh Biome branch
        env:
          FIX_BRANCH: ${{ steps.branches.outputs.fix_branch }}
        run: git switch -c "$FIX_BRANCH"

      - name: Apply Biome fixes
        env:
          BIOME_NPM: "1"
        run: deno task lint

      - name: Commit and push fixes
        id: commit
        env:
          FIX_BRANCH: ${{ steps.branches.outputs.fix_branch }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Biome did not produce any changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply Biome fixes"
          git push --set-upstream origin "$FIX_BRANCH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.commit.outputs.has_changes == 'true'
        env:
          FIX_BRANCH: ${{ steps.branches.outputs.fix_branch }}
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: ${{ steps.branches.outputs.target_branch }}
        run: |
          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$FIX_BRANCH" \
            --title "Apply Biome fixes to $TARGET_BRANCH" \
            --body "This PR applies Biome fixes generated by \`deno task lint\` for \`$TARGET_BRANCH\`."
