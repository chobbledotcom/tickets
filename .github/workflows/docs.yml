name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate docs
        run: >-
          deno doc --html --name="Chobble Tickets" --output=docs-output
          src/doc.ts
          src/docs/database.ts
          src/docs/crypto.ts
          src/docs/payments.ts
          src/docs/email.ts
          src/docs/tickets.ts
          src/docs/events.ts
          src/docs/config.ts
          src/docs/utilities.ts
          src/docs/embed.ts
          src/docs/webhooks.ts
          src/docs/demo.ts

      - name: Disable Jekyll processing
        run: touch docs-output/.nojekyll

      - name: Add root redirect to overview page
        run: |
          cat > docs-output/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=doc.ts/index.html">
            <title>Chobble Tickets Documentation</title>
          </head>
          <body>
            <p>Redirecting to <a href="doc.ts/index.html">documentation</a>...</p>
          </body>
          </html>
          HTMLEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
