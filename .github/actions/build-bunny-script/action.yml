name: Build Bunny edge script
description: Set up Deno, install dependencies, and build the Bunny Edge script bundle.
inputs:
  build_commit:
    description: Commit SHA to embed in the build.
    required: true
  build_timestamp:
    description: >-
      Optional build timestamp to embed (ISO-8601). Used by the restore-deploy
      workflow to stamp a rebuilt old commit with its original version. Defaults
      to the current time when blank.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.5.6

    - name: Install dependencies
      shell: bash
      run: deno install --allow-scripts

    - name: Build edge script
      shell: bash
      run: deno task build:edge
      env:
        BUILD_COMMIT: ${{ inputs.build_commit }}
        BUILD_TIMESTAMP: ${{ inputs.build_timestamp }}
